<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /* -------------------------VARIABLE QUE GUARDAN LA DIRECCION EN DONDE VIENE EL IMEI */
        const $path = document.URL,
        /* -------------------------VARIABLE QUE SEPARA LA DIRECCION Y GUARDA NADA MAS EL IMEI */
            $imei = $path.split('/').pop();
            /* -------------------------CRAMOS EL IMEI EN UNA VARIABLE LOCAL DEL NAVEGADOR */
        localStorage.setItem("imei", $imei.toString());
        /* -----------------------------REDIRECCIONAMOS A LA PAGINA PRINCIPAL */
        window.location.href = "https://mera-xxess.github.io/sgdmine/";
    </script>
</body>
</html>
