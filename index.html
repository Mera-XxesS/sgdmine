<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Monitoreo de Dispositivos Moviles del INE</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/media_queryes.css">
</head>
<body>
    <div class="content">
        <div class="dm_content">
            <div class="dm_photo">
                <img src="assets/img/wiko t3 frente.jpg" alt="Imagen generica del dispositivo, la imagen real puedo variar">
            </div>
            <div class="dm_info">
                <h3>INFORMACION DISPOSITIVO</h3>
                <h5 class="no">Dispositivo N° <label id="no">001</label></h5>
                <h5 class="imei">IMEI : <label id="imei">123456789098765</label></h5>
                <h5 class="no_serie">N° Serie : <label id="no_serie">XYZ123WV</label></h5>
                <h5 class="model"> Modelo : <label id="model">Wiko T3</label></h5>     
                <table>
                    <tr>
                        <td></td>
                        <td>Tiene</td>
                        <td>Funcional</td>
                        <td>Original</td>
                    </tr>
                    <!-- Fila de datos 1 -->
                    <tr>
                        <td>Cargador</td>
                        <td class="td_radio"><input type="radio" name="" id=""></td>
                        <td class="td_radio"><input type="radio" name="" id=""></td>
                        <td class="td_radio"><input type="radio" name="" id=""></td>
                    </tr>
                    <!-- Fila de datos 2 -->
                    <tr>
                        <td>Cable USB</td>
                        <td class="td_radio"><input type="radio" name="" id=""></td>
                        <td class="td_radio"><input type="radio" name="" id=""></td>
                        <td class="td_radio"><input type="radio" name="" id=""></td>
                    </tr>
                    <tr>
                        <td>Funda</td>
                        <td></td>
                        <td></td>
                        <td class="td_radio"><input type="radio" name="" id=""></td>
                    </tr>
                    <tr>
                        <td>Clip</td>
                        <td></td>
                        <td></td>
                        <td class="td_radio"><input type="radio" name="" id=""></td>
                    </tr>
                </table>          
            </div>
        </div>
        <div class="secae_content">
            <div class="secae_info">
                <h3>INFORMACION SE/CAE</h3>
                <H5 class="secae_name">Nombre : <label id="secae_name">Leonardo Mazuca Perez</label></H5>
                <H5 class="secae_position">Puesto : <label id="secae_position">Técnico de voz y datos</label></H5>
                <H5 class="se"> SE : <label id="se">Jesus Ivan Pineda Contreras</label></H5>
                <H5 class="secae_phone_number">Telefono : <label id="secae_phone_number">8719230680</label></H5>
                <H5 class="secae_e-mail">Correo : <label id="secae_e-mail">leonardo.mazuca@ine.mx</label></H5>
                <div class="are_zore">
                    <H5 class="secae_zore">Zore : <label id="secae_zore">01</label></H5>
                    <H5 class="secae_are">Are : <label id="secae_are">01</label></H5>
                </div>
                <H5 class="secae_employee_number">N° de empleado : <label id="secae_employee_number">123456789</label></H5>
            </div>
            <div class="secae_photo">
                <img src="assets/img/perfil.jpg" alt="Fotografia del Responsable del Dispositivo Móvil" srcset="">
            </div>
        </div>
        <div class="carrusel_content">
            <div class="group">
                <img src="assets/img/1.jpeg" alt="" class="card">
                <img src="assets/img/2.jpeg" alt="" class="card">
                <img src="assets/img/3.jpeg" alt="" class="card">
                <img src="assets/img/4.jpeg" alt="" class="card">
                <img src="assets/img/5.jpeg" alt="" class="card">
                <img src="assets/img/6.jpeg" alt="" class="card">
            </div>
            <div aria-hidden class="group">
                <img src="assets/img/1.jpeg" alt="" class="card">
                <img src="assets/img/2.jpeg" alt="" class="card">
                <img src="assets/img/3.jpeg" alt="" class="card">
                <img src="assets/img/4.jpeg" alt="" class="card">
                <img src="assets/img/5.jpeg" alt="" class="card">
                <img src="assets/img/6.jpeg" alt="" class="card">
            </div>
    </div>
</body>
</html>
