<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Monitoreo de Dispositivos Moviles del INE</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/media_queryes.css">
    <!-- ESTO ES LA LIBRERIA QUE SE UTILIZA PARA EL MENSAJE DEL INICIO -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="content">
        <header class="header">
        <div class="header_content">
            <img src="assets/img/Logo_Instituto_Nacional_Electoral.svg.png" alt="INE Logo">
            <div class="h1">
                <h1>SGDM</h1>
                <label class="sgdm_label">Sistema de Gestion de Dispositivos Moviles</label>
            </div>
            
        </div>
    </header>
        <div class="dm_content">
            <div class="dm_photo">
                <img class="front_image" src="assets/img/dm/wiko/wiko_t3_frente.png" alt="Imagen generica del dispositivo, la imagen real puedo variar">
                <img class="back_image" src="assets/img/dm/wiko/wiko_t3_reverso.png" alt="Imagen generica del dispositivo, la imagen real puedo variar">
            </div>
            <div class="dm_info">
                <h3>INFORMACION DISPOSITIVO</h3>
                <h5 class="no">Dispositivo N° <label id="no_dm">001</label></h5>
                <h5 class="imei">IMEI : <label id="imei">123456789098765</label></h5>
                <h5 class="no_serie">N° Serie : <label id="no_serie">XYZ123WV</label></h5>
                <h5 class="model"> Modelo : <label id="model">Wiko T3</label></h5>     
                <table>
                    <tr>
                        <td></td>
                        <td>Tiene</td>
                        <td>Funcional</td>
                        <td>Original</td>
                    </tr>
                    <!-- Fila de datos 1 -->
                    <tr>
                        <td>Cargador</td>
                        <td class="td_radio"><input type="radio" name="" id="has_charger"></td>
                        <td class="td_radio"><input type="radio" name="" id="works_charger"></td>
                        <td class="td_radio"><input type="radio" name="" id="original_charger"></td>
                    </tr>
                    <!-- Fila de datos 2 -->
                    <tr>
                        <td>Cable USB</td>
                        <td class="td_radio"><input type="radio" name="" id="has_usb"></td>
                        <td class="td_radio"><input type="radio" name="" id="works_usb"></td>
                        <td class="td_radio"><input type="radio" name="" id="original_usb"></td>
                    </tr>
                    <tr>
                        <td>Funda</td>
                        <td></td>
                        <td></td>
                        <td class="td_radio"><input type="radio" name="" id="protect"></td>
                    </tr>
                    <tr>
                        <td>Clip</td>
                        <td></td>
                        <td></td>
                        <td class="td_radio"><input type="radio" name="" id="clip"></td>
                    </tr>
                </table>          
            </div>
        </div>
        <div class="secae_content">
            <div class="secae_info">
                <h3>INFORMACION SE/CAE</h3>
                <H5 class="secae_name">Nombre : <label id="secae_name">Leonardo Mazuca Perez</label></H5>
                <H5 class="secae_position">Puesto : <label id="secae_position">Técnico de voz y datos</label></H5>
                <H5 class="se"> SE : <label id="se">Jesus Ivan Pineda Contreras</label></H5>
                <H5 class="secae_phone_number">Telefono : <label id="secae_phone_number">8719230680</label></H5>
                <H5 class="secae_e-mail">Correo : <label id="secae_email">leonardo.mazuca@ine.mx</label></H5>
                <div class="are_zore">
                    <H5 class="secae_zore">Zore : <label id="secae_zore">01</label></H5>
                    <H5 class="secae_are">Are : <label id="secae_are">01</label></H5>
                </div>
                <H5 class="secae_employee_number">N° de empleado : <label id="secae_employee_number">123456789</label></H5>
            </div>
            <div class="secae_photo">
                <img src="assets/img/photos/se/Z 1.jpeg" alt="Fotografia del Responsable del Dispositivo Móvil" id="secae_photo">
            </div>
        </div>
        <div class="carrusel_content">
            <div class="group">
                <img src="assets/img/dm/se/z1/1.jpeg" alt="" class="card">
                <img src="assets/img/dm/se/z1/2.jpeg" alt="" class="card">
                <img src="assets/img/dm/se/z1/3.jpeg" alt="" class="card">
                <img src="assets/img/dm/se/z1/4.jpeg" alt="" class="card">
                <img src="assets/img/dm/se/z1/5.jpeg" alt="" class="card">
                <img src="assets/img/dm/se/z1/6.jpeg" alt="" class="card">
            </div>
            <div aria-hidden class="group">
                <img src="assets/img/dm/se/z1/1.jpeg" alt="" class="card">
                <img src="assets/img/dm/se/z1/2.jpeg" alt="" class="card">
                <img src="assets/img/dm/se/z1/3.jpeg" alt="" class="card">
                <img src="assets/img/dm/se/z1/4.jpeg" alt="" class="card">
                <img src="assets/img/dm/se/z1/5.jpeg" alt="" class="card">
                <img src="assets/img/dm/se/z1/6.jpeg" alt="" class="card">
            </div>
    </div>
</body>
<script src="js/main.js"></script>
<script src="js/load_data.js"></script>

</html>
